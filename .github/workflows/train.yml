name: Train Titanic Model

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install pandas
        pip install numpy
        pip install scikit-learn
        pip install mlflow

    - name: Run Model Training
      run: |
        cd MLProject
        python modelling.py